; PlatformIO project for the ARC fake-FC-N bridge on Teensy 4.1.
; The Teensy speaks the ARC protocol over Serial1 (pins 0/1) to the
; Pi's /dev/serial0, and exposes a friendly REPL on USB Serial.
;
; The arc_protocol library is referenced by symlink from this repo's
; com-protocol/ folder, so changes to the C library show up on the
; next build with no copy step.

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

monitor_speed = 115200
monitor_filters = send_on_enter

; Reference the in-repo C library directly. PlatformIO follows the
; symlink:// scheme to a local path containing a library.json.
lib_deps = symlink://../../com-protocol

; Larger USB serial buffer so paste-bombs of long commands don't drop.
build_flags =
    -DSERIAL_RX_BUFFER_SIZE=512
